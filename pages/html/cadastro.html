<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>

<body>
    <main class="page">
        <form class="formLogin">
            <img src="../../img/Frame 1.png" alt="Logo">

            <h1>Criar Conta</h1>
            <hr>
            <p>Preencha os dados abaixo para criar sua conta.</p>

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo" autofocus />

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" />

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="Digite seu telefone" />

            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Digite sua senha" />

            <label for="confirmPassword">Confirmar Senha</label>
            <input type="password" id="confirmPassword" placeholder="Confirme sua senha" />

            <button type="submit" class="btn">Cadastrar</button>

            <nav class="form-links">
                <a href="../html/login.html">Já tem conta? Faça login</a>
            </nav>
        </form>
    </main>
</body>

</html>
