<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="../css/senha.css">
</head>

<body>
    <main class="page">
        <form class="formLogin">
            <img src="../../img/Frame 1.png" alt="Logo">

            <h1>Recuperar Senha</h1>
            <hr>
            <p>Digite seu e-mail para receber o link de recuperação.</p>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" autofocus />

            <button type="submit" class="btn">Enviar Link</button>

            <nav class="form-links">
                <a href="../html/login.html">Voltar para o Login</a>
            </nav>
        </form>
    </main>
</body>

</html>
